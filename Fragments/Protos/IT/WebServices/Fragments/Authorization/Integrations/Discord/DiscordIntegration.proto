syntax = "proto3";

package IT.WebServices.Fragments.Authorization.Integrations.Discord;

message DiscordIntegrationPublicRecord {
	string BotName = 1;
	string Description = 2;
	repeated string Tags = 3;
}

message DiscordIntegrationPrivateRecord {
	string ClientId = 1;
	string GuildId = 2;
	string ApplicationId = 3;
}

message DiscordIntegrationOwnerRecord {
	bool Enabled = 1;
	string BotToken = 2;
	string ClientSecret = 3;
}